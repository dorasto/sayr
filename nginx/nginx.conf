worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    client_max_body_size 10M;


    log_format custom_log '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          '"$http_x_forwarded_for" "$upstream_addr" '
                          '$request_time $upstream_response_time $pipe';
    access_log /var/log/nginx/access.log custom_log;
    error_log /var/log/nginx/error.log warn;


    upstream web_app {
        server start:3000;
        keepalive 16;
    }

    upstream backend_app {
        server backend:5468;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        gzip off; # Keep gzip off


        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        location /api/auth/ {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location /api {
            proxy_pass http://backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location /api/ {
            proxy_pass http://backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location /ws {
            proxy_pass http://backend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://web_app;

            # Clear ALL proxy_set_header and proxy_hide_header for this location
            # to be truly transparent. Nginx will default to passing most headers.
            # We explicitly set Host to ensure correct routing on upstream.
            proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr; # Removed for ultimate transparency
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Removed
            # proxy_set_header X-Forwarded-Proto $scheme; # Removed

            # Clear request headers Nginx might add that confuse upstream
            proxy_set_header Connection ""; # Tell Nginx not to send a Connection header to upstream

            # Set Nginx to use HTTP/1.1 for the upstream connection
            proxy_http_version 1.1;

            # Don't buffer any part of the response
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;

            # Tell Nginx not to ask for compressed content from upstream
            proxy_set_header Accept-Encoding "";

            # Explicitly clear potential problem headers from upstream,
            # letting Nginx handle final Transfer-Encoding implicitly (by streaming)
            # This is where we might *have* to hide it if the frontend is broken.
            proxy_hide_header Content-Encoding;
            proxy_hide_header Transfer-Encoding;
        }
    }
}
