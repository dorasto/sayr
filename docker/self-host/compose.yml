version: "3.8"

services:
  start:
    container_name: sayr-start
    image: ghcr.io/dorasto/sayr-ce-start:latest
    restart: always
    pull_policy: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - VITE_URL_ROOT=${VITE_URL_ROOT}
      - VITE_PROJECT_NAME=${VITE_PROJECT_NAME}
      - VITE_ROOT_DOMAIN=${VITE_ROOT_DOMAIN}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - VITE_SAYR_FRONTEND_AXIOM_TOKEN=${VITE_SAYR_FRONTEND_AXIOM_TOKEN}
      - VITE_SAYR_FRONTEND_AXIOM_DATASET=${VITE_SAYR_FRONTEND_AXIOM_DATASET}
      - VITE_KLIPY_API=${VITE_KLIPY_API}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - VITE_GITHUB_APP_NAME=${VITE_GITHUB_APP_NAME}
      - QUEUE_MODE=${QUEUE_MODE}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - APP_ENV=${APP_ENV}

  backend:
    container_name: sayr-backend
    image: ghcr.io/dorasto/sayr-ce-backend:latest
    restart: always
    pull_policy: always
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - APP_ENV=${APP_ENV}

  github-worker:
    container_name: sayr-worker-github
    image: ghcr.io/dorasto/sayr-ce-worker:latest
    restart: always
    pull_policy: always
    command: ["bun", "run", "dist/index.js", "github"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - APP_ENV=${APP_ENV}

  redis:
    image: redis:7-alpine
    container_name: sayr-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  garage:
    image: dxflrs/garage:v0.9.4
    container_name: garage
    restart: always
    volumes:
      - garage_data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"
      - "3901:3901"
    command: ["garage", "server"]

  # One-shot init container to:
  # - init layout
  # - assign node
  # - import key from env
  # - create bucket
  # - allow key on bucket
  garage-init:
    image: dxflrs/garage:v0.9.4
    depends_on:
      - garage
    volumes:
      - garage_data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      set -e

      echo 'Waiting for garage...'
      until garage status >/dev/null 2>&1; do
        sleep 1
      done

      echo 'Initializing layout (idempotent)...'
      garage layout init || true

      NODE_ID=$(garage node id)
      echo 'Using node ID:' $NODE_ID

      garage layout assign -z zone1 -c 1 $NODE_ID || true
      garage layout apply || true

      echo 'Importing key from env...'
      garage key import sayr-key \
        --access-key \"$STORAGE_ACCESS_KEY\" \
        --secret-key \"$STORAGE_SECRET_KEY\" || true

      echo 'Creating bucket:' \"$STORAGE_BUCKET\"
      garage bucket create \"$STORAGE_BUCKET\" || true

      echo 'Allowing key on bucket...'
      garage bucket allow \"$STORAGE_BUCKET\" \
        --read --write --owner sayr-key || true

      echo 'Garage init done.'
      "

  # ===============================
  # NGINX ROUTING LAYER
  # ===============================
  nginx:
    build:
      context: .
      dockerfile: ./apps/nginx/Dockerfile
    expose:
      - "80"
    ports:
      - "3000:80"

    labels:
      - traefik.enable=true
  
      # Root
      - traefik.http.routers.root.rule=Host(`${VITE_ROOT_DOMAIN}`) || Host(`www.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.root.entrypoints=https
      - traefik.http.routers.root.tls=true
  
      # API
      - traefik.http.routers.api.rule=Host(`api.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls=true
  
      # Admin
      - traefik.http.routers.admin.rule=Host(`admin.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=https
      - traefik.http.routers.admin.tls=true

      # Files
      - traefik.http.routers.files.rule=Host(`files.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.files.entrypoints=https
      - traefik.http.routers.files.tls=true
      
      # Wildcard
      - traefik.http.routers.wildcard.rule=HostRegexp(`{subdomain:.+}.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.wildcard.entrypoints=https
      - traefik.http.routers.wildcard.tls=true
  
      - traefik.http.services.nginx.loadbalancer.server.port=80
volumes:
  redis_data:
  garage_data: