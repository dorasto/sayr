version: "3.8"

services:
  start:
    container_name: sayr-start
    image: ghcr.io/dorasto/sayr-start:staging
    restart: always
    pull_policy: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - VITE_URL_ROOT=${VITE_URL_ROOT}
      - VITE_PROJECT_NAME=${VITE_PROJECT_NAME}
      - VITE_ROOT_DOMAIN=${VITE_ROOT_DOMAIN}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - VITE_SAYR_FRONTEND_AXIOM_TOKEN=${VITE_SAYR_FRONTEND_AXIOM_TOKEN}
      - VITE_SAYR_FRONTEND_AXIOM_DATASET=${VITE_SAYR_FRONTEND_AXIOM_DATASET}
      - VITE_TENOR_API=${VITE_TENOR_API}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - VITE_GITHUB_APP_NAME=${VITE_GITHUB_APP_NAME}
      - QUEUE_MODE=${QUEUE_MODE}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - SAYR_CLOUD=${SAYR_CLOUD}
      - APP_ENV=${APP_ENV}

  backend:
    container_name: sayr-backend
    image: ghcr.io/dorasto/sayr-backend:staging
    restart: always
    pull_policy: always
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - SAYR_CLOUD=${SAYR_CLOUD}
      - APP_ENV=${APP_ENV}

  github-worker:
    container_name: sayr-worker-github
    image: ghcr.io/dorasto/sayr-worker:staging
    restart: always
    pull_policy: always
    command: ["bun", "run", "dist/index.js", "github"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - SAYR_CLOUD=${SAYR_CLOUD}
      - APP_ENV=${APP_ENV}

  redis:
    image: redis:7-alpine
    container_name: sayr-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  # ===============================
  # NGINX ROUTING LAYER
  # ===============================
  nginx:
    build:
      context: .
      dockerfile: ./apps/nginx/Dockerfile
    expose:
      - "80"
    ports:
      - "3000:80"

    labels:
      - traefik.enable=true

      # Root
      - traefik.http.routers.root.rule=Host(`${VITE_ROOT_DOMAIN}`) || Host(`www.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.root.entrypoints=https
      - traefik.http.routers.root.tls=true

      # API
      - traefik.http.routers.api.rule=Host(`api.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=https
      - traefik.http.routers.api.tls=true

      # Admin
      - traefik.http.routers.admin.rule=Host(`admin.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=https
      - traefik.http.routers.admin.tls=true

      - traefik.http.services.nginx.loadbalancer.server.port=80
volumes:
  redis_data:
