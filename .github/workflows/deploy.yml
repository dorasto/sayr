name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check if images were published
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the jobs for the workflow run
          jobs=$(gh run view ${{ github.event.workflow_run.id }} --json jobs -q '.jobs')

          # Check if merge-manifest job was successful
          # The job name in the matrix might be "merge-manifest (web)" etc.
          # We look for any job with name containing "merge-manifest" and conclusion "success"
          count=$(echo "$jobs" | jq '[.[] | select(.name | contains("merge-manifest")) | select(.conclusion == "success")] | length')

          if [ "$count" -gt "0" ]; then
            echo "Images were published."
            echo "deployed=true" >> $GITHUB_OUTPUT
          else
            echo "No images published (merge-manifest skipped or failed)."
            echo "deployed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Coolify deployment
        if: steps.check.outputs.deployed == 'true'
        run: |
          curl --request GET '${{secrets.SAYR_DEPLOY}}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_ROOT_API_KEY }}'
