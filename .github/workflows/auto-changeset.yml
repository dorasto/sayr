name: Auto-Generate Changeset

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  generate-changeset:
    # Only run if PR was merged and has a release label
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Detect release type from labels
        id: release-type
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          echo "Labels: $PR_LABELS"
          
          if echo "$PR_LABELS" | grep -q "release:major"; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "Detected: MAJOR release"
          elif echo "$PR_LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "Detected: MINOR release"
          elif echo "$PR_LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Detected: PATCH release"
          elif echo "$PR_LABELS" | grep -q "release:skip"; then
            echo "bump=skip" >> $GITHUB_OUTPUT
            echo "Detected: SKIP release"
          else
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "No release label found"
          fi

      - name: Generate changeset file
        if: steps.release-type.outputs.bump != 'skip' && steps.release-type.outputs.bump != 'none'
        env:
          BUMP_TYPE: ${{ steps.release-type.outputs.bump }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Create changeset directory if it doesn't exist
          mkdir -p .changeset
          
          # Generate a unique changeset filename
          TIMESTAMP=$(date +%s)
          CHANGESET_FILE=".changeset/auto-${PR_NUMBER}-${TIMESTAMP}.md"
          
          # Create the changeset content
          cat > "$CHANGESET_FILE" <<EOF
          ---
          "start": ${BUMP_TYPE}
          "backend": ${BUMP_TYPE}
          "worker": ${BUMP_TYPE}
          "marketing": ${BUMP_TYPE}
          "@repo/auth": ${BUMP_TYPE}
          "@repo/database": ${BUMP_TYPE}
          "@repo/storage": ${BUMP_TYPE}
          "@repo/ui": ${BUMP_TYPE}
          "@repo/util": ${BUMP_TYPE}
          ---
          
          ${PR_TITLE}
          
          ${PR_BODY}
          EOF
          
          echo "Generated changeset file: $CHANGESET_FILE"
          cat "$CHANGESET_FILE"

      - name: Commit changeset
        if: steps.release-type.outputs.bump != 'skip' && steps.release-type.outputs.bump != 'none'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset
          git commit -m "chore: add changeset for PR #${PR_NUMBER}"
          git push

      - name: Comment on PR (no release label)
        if: steps.release-type.outputs.bump == 'none'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **No release label detected** on this PR. If this should trigger a release, please add one of: `release:major`, `release:minor`, `release:patch`, or `release:skip`.\n\nSince the PR is already merged, you may need to manually create a changeset or add the label and re-run this workflow.'
            })

      - name: Comment on PR (skip release)
        if: steps.release-type.outputs.bump == 'skip'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Release skipped** as requested by `release:skip` label.'
            })
