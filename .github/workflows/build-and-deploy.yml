name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version to tag (e.g., v1.2.3)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    name: Build and Push
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'blacksmith-4vcpu-ubuntu-2404-arm' || 'blacksmith-4vcpu-ubuntu-2404' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [start, backend, worker, traefik, marketing]
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Docker Config
        id: config
        run: |
          if [[ "${{ matrix.app }}" == "start" ]]; then
            echo "dockerfile=./apps/start/Dockerfile" >> $GITHUB_OUTPUT
            echo "image_suffix=-start" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "backend" ]]; then
            echo "dockerfile=./apps/backend/Dockerfile" >> $GITHUB_OUTPUT
            echo "image_suffix=-backend" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "worker" ]]; then
            echo "dockerfile=./apps/worker/Dockerfile" >> $GITHUB_OUTPUT
            echo "image_suffix=-worker" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "traefik" ]]; then
            echo "dockerfile=./apps/traefik/Dockerfile" >> $GITHUB_OUTPUT
            echo "image_suffix=-traefik" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "marketing" ]]; then
            echo "dockerfile=./apps/marketing/Dockerfile" >> $GITHUB_OUTPUT
            echo "image_suffix=-marketing" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
        with:
          platforms: ${{ matrix.platform }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.app }}-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifest:
    needs: [build-image]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [start, backend, worker, traefik, marketing]
    steps:
      - name: Determine Docker Config
        id: config
        run: |
          if [[ "${{ matrix.app }}" == "start" ]]; then
            echo "image_suffix=-start" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "backend" ]]; then
            echo "image_suffix=-backend" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "worker" ]]; then
            echo "image_suffix=-worker" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "traefik" ]]; then
            echo "image_suffix=-traefik" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "marketing" ]]; then
            echo "image_suffix=-marketing" >> $GITHUB_OUTPUT
          fi

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.app }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}:latest

  deploy:
    needs: [merge-manifest]
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Redeploy traefik
        run: railway redeploy -y --service traefik --watch
      
      - name: Redeploy backend
        run: railway redeploy -y --service backend --watch
      
      - name: Redeploy worker
        run: railway redeploy -y --service worker --watch
      
      - name: Redeploy start
        run: railway redeploy -y --service start --watch
      
      - name: Redeploy marketing
        run: railway redeploy -y --service marketing --watch
