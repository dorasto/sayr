name: Build and Deploy

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: "Version to tag (e.g., v1.2.3)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    name: Build and Push
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'blacksmith-4vcpu-ubuntu-2404-arm' || 'blacksmith-4vcpu-ubuntu-2404' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [start, backend, worker, marketing]
        platform:
          - linux/amd64
          - linux/arm64
        edition: [cloud, ce]
        exclude:
          # Marketing site is cloud-only
          - app: marketing
            edition: ce
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Docker Config
        id: config
        run: |
          # Dockerfile path
          if [[ "${{ matrix.app }}" == "start" ]]; then
            echo "dockerfile=./apps/start/Dockerfile" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "backend" ]]; then
            echo "dockerfile=./apps/backend/Dockerfile" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "worker" ]]; then
            echo "dockerfile=./apps/worker/Dockerfile" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.app }}" == "marketing" ]]; then
            echo "dockerfile=./apps/marketing/Dockerfile" >> $GITHUB_OUTPUT
          fi

          # Image suffix: CE images get -ce- prefix
          if [[ "${{ matrix.edition }}" == "ce" ]]; then
            echo "image_suffix=-ce-${{ matrix.app }}" >> $GITHUB_OUTPUT
          else
            echo "image_suffix=-${{ matrix.app }}" >> $GITHUB_OUTPUT
          fi

          # Edition build arg
          if [[ "${{ matrix.edition }}" == "ce" ]]; then
            echo "edition_baked=community" >> $GITHUB_OUTPUT
          else
            echo "edition_baked=cloud" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
        with:
          platforms: ${{ matrix.platform }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SAYR_EDITION_BAKED=${{ steps.config.outputs.edition_baked }}
            ${{ matrix.app == 'marketing' && format('PUBLIC_CAP_API_ENDPOINT={0}', secrets.PUBLIC_CAP_API_ENDPOINT) || '' }}
            ${{ matrix.app == 'start' && format('VITE_APP_VERSION={0}', inputs.version) || '' }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.edition }}-${{ matrix.app }}-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifest:
    needs: [build-image]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [start, backend, worker, marketing]
        edition: [cloud, ce]
        exclude:
          - app: marketing
            edition: ce
    steps:
      - name: Determine Docker Config
        id: config
        run: |
          if [[ "${{ matrix.edition }}" == "ce" ]]; then
            echo "image_suffix=-ce-${{ matrix.app }}" >> $GITHUB_OUTPUT
          else
            echo "image_suffix=-${{ matrix.app }}" >> $GITHUB_OUTPUT
          fi

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.edition }}-${{ matrix.app }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ steps.config.outputs.image_suffix }}:latest

  deploy:
    needs: [merge-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl --request GET '${{secrets.SAYR_DEPLOY}}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_ROOT_API_KEY }}'
