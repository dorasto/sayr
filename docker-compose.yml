version: "3.8"

services:
  start:
    container_name: sayr-start
    image: ghcr.io/dorasto/sayr-start:latest
    restart: always
    pull_policy: always
    expose:
      - "8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DORAS_CLIENT_ID=${DORAS_CLIENT_ID}
      - DORAS_CLIENT_SECRET=${DORAS_CLIENT_SECRET}
      - VITE_URL_ROOT=${VITE_URL_ROOT}
      - VITE_PROJECT_NAME=${VITE_PROJECT_NAME}
      - VITE_ROOT_DOMAIN=${VITE_ROOT_DOMAIN}
      - STORAGE_URL=${STORAGE_URL}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - FILE_SALT=${FILE_SALT}
      - FILE_CDN=${FILE_CDN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - STORAGE_PORT=${STORAGE_PORT}
      - FILE_NAME_HASH_LENGTH=${FILE_NAME_HASH_LENGTH}
      - DORAS_ORGANIZATION=${DORAS_ORGANIZATION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - VITE_SAYR_FRONTEND_AXIOM_TOKEN=${VITE_SAYR_FRONTEND_AXIOM_TOKEN}
      - VITE_SAYR_FRONTEND_AXIOM_DATASET=${VITE_SAYR_FRONTEND_AXIOM_DATASET}
      - VITE_TENOR_API=${VITE_TENOR_API}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - VITE_GITHUB_APP_NAME=${VITE_GITHUB_APP_NAME}
      - QUEUE_MODE=${QUEUE_MODE}
      - SAYR_EMAIL=${SAYR_EMAIL}
      - AXIOM_OTEL_TOKEN=${AXIOM_OTEL_TOKEN}
      - AXIOM_OTEL_DATASET=${AXIOM_OTEL_DATASET}
      - AXIOM_OTEL_DOMAIN=${AXIOM_OTEL_DOMAIN}
      - SAYR_CLOUD=${SAYR_CLOUD}
      - APP_ENV=${APP_ENV}
    labels:
      - traefik.enable=true

      # Wildcard subdomains → start
      - traefik.http.routers.sub-default.rule=HostRegexp(`{subdomain:.+}.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.sub-default.priority=10
      - traefik.http.routers.sub-default.service=start

      # Auth API
      - traefik.http.routers.sub-auth.rule=HostRegexp(`{subdomain:.+}.${VITE_ROOT_DOMAIN}`) && PathPrefix(`/api/auth`)
      - traefik.http.routers.sub-auth.priority=200
      - traefik.http.routers.sub-auth.service=start

      - traefik.http.services.start.loadbalancer.server.port=8080


  backend:
    container_name: sayr-backend
    image: ghcr.io/dorasto/sayr-backend:latest
    restart: always
    pull_policy: always
    expose:
      - "5468"
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - APP_ENV=${APP_ENV}
    labels:
      - traefik.enable=true

      # Root domain API
      - traefik.http.routers.root-api.rule=Host(`${VITE_ROOT_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.root-api.priority=50
      - traefik.http.routers.root-api.service=backend

      - traefik.http.routers.root-api-www.rule=Host(`www.${VITE_ROOT_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.root-api-www.priority=50
      - traefik.http.routers.root-api-www.service=backend

      # API subdomain
      - traefik.http.routers.api-sub.rule=Host(`api.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.api-sub.priority=300
      - traefik.http.routers.api-sub.middlewares=api-public-rewrite
      - traefik.http.routers.api-sub.service=backend

      # Rewrite middleware
      - traefik.http.middlewares.api-public-rewrite.replacepathregex.regex=^(.*)
      - traefik.http.middlewares.api-public-rewrite.replacepathregex.replacement=/api/public$$1

      - traefik.http.services.backend.loadbalancer.server.port=5468


  marketing:
    container_name: sayr-marketing
    image: ghcr.io/dorasto/sayr-marketing:latest
    restart: always
    pull_policy: always
    expose:
      - "8080"
    labels:
      - traefik.enable=true

      # Root domain default
      - traefik.http.routers.root-default.rule=Host(`${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.root-default.priority=1
      - traefik.http.routers.root-default.service=marketing

      - traefik.http.routers.root-default-www.rule=Host(`www.${VITE_ROOT_DOMAIN}`)
      - traefik.http.routers.root-default-www.priority=1
      - traefik.http.routers.root-default-www.service=marketing

      - traefik.http.services.marketing.loadbalancer.server.port=8080


  github-worker:
    container_name: sayr-worker-github
    image: ghcr.io/dorasto/sayr-worker:latest
    restart: always
    pull_policy: always
    command: ["bun", "run", "dist/index.js", "github"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}

  redis:
    image: redis:7-alpine
    container_name: sayr-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  redis_data: