env VITE_ROOT_DOMAIN;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 10M;

    # ------------------------
    # Domain parsing (ENV-DRIVEN)
    # ------------------------
    map $host $is_root_domain {
        ~^www\.${VITE_ROOT_DOMAIN}$ 1;
        ~^${VITE_ROOT_DOMAIN}$      1;
        default                  0;
    }

    map $host $is_admin_subdomain {
        ~^admin\.${VITE_ROOT_DOMAIN}$ 1;
        default                    0;
    }

    map $host $tenant {
        ~^(?<t>[^.]+)\.${VITE_ROOT_DOMAIN}$ $t;
        default "";
    }

    # ------------------------
    # Upstreams
    # ------------------------
    # upstream marketing {
    #     server marketing:8080;
    #     keepalive 16;
    # }

    upstream admin_app {
        server start:8080;
        keepalive 16;
    }

    upstream backend_app {
        server backend:5468;
        keepalive 16;
    }

    # ==================================================
    # SINGLE SERVER (DOMAIN-AWARE)
    # ==================================================
    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        # ------------------------
        # /admin on root → admin subdomain
        # ------------------------
        if ($is_root_domain) {
            if ($request_uri ~ ^/admin(?<rest>/.*)?$) {
                return 302 http://admin.$VITE_ROOT_DOMAIN$rest;
            }
        }

        # ------------------------
        # API → backend
        # ------------------------
        location /api/ {
            proxy_pass http://backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ------------------------
        # WebSocket → backend
        # ------------------------
        location /ws {
            proxy_pass http://backend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        # ------------------------
        # Routing logic
        # ------------------------
        location / {
            # # Root domain → marketing
            # if ($is_root_domain) {
            #     proxy_pass http://marketing;
            #     break;
            # }

            # Admin subdomain → /admin
            if ($is_admin_subdomain) {
                proxy_pass http://admin_app/admin/;
                break;
            }

            # Tenant subdomain → /$tenant
            if ($tenant != "") {
                proxy_pass http://admin_app/$tenant/;
                break;
            }

            return 404;
        }
    }
}