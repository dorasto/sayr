<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sayr.io Task</title>

    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        h2 {
            font-size: 18px;
            margin-top: 30px;
        }

        .task {
            border-bottom: 1px solid #333;
            padding-bottom: 18px;
        }

        /* Meta */

        .task-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.95;
        }

        .status-backlog {
            background: #444;
        }

        .status-in-progress {
            background: #0066cc;
        }

        .status-completed {
            background: #00aa00;
        }

        .priority-high {
            background: #cc0000;
        }

        .priority-medium {
            background: #cc8800;
        }

        .priority-urgent {
            background: #ea00ff;
        }

        .priority-none {
            background: #555;
        }

        /* Labels */

        .labels {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .label {
            max-width: 220px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #111;
        }

        /* Assignees */

        .assignees {
            display: flex;
            gap: 4px;
            align-items: center;
            margin-bottom: 10px;
        }

        .assignee img,
        .assignee.more {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #111;
        }

        .assignee img {
            cursor: pointer;
        }

        .assignee.more {
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .task-body {
            line-height: 1.5;
        }

        /* Comments */

        .comment {
            border-bottom: 1px solid #333;
            padding: 12px 0;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .author {
            font-weight: bold;
        }

        .date {
            font-size: 12px;
            color: #888;
        }

        .comment-body {
            margin-top: 6px;
            line-height: 1.4;
        }

        /* ---- Rich content safety (task + comments) ---- */

        .task-body img,
        .task-body video,
        .comment-body img,
        .comment-body video {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
            margin: 8px 0;
        }

        /* Prevent tall videos/GIFs from dominating */
        .task-body video,
        .comment-body video {
            max-height: 400px;
        }

        /* Prevent overflow from embeds */
        .task-body iframe,
        .comment-body iframe,
        .task-body embed,
        .comment-body embed {
            max-width: 100%;
        }

        .reactions {
            margin-top: 6px;
            display: flex;
            gap: 8px;
            font-size: 12px;
        }

        .reaction {
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 2px 8px;
        }

        .sentinel {
            height: 1px;
        }

        /* ---- Mentions ---- */

        /* Base mention */
        .task-body .mention,
        .comment-body .mention {
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        /* User mention */
        .mention[data-kind="user"] {
            background: rgba(0, 150, 255, 0.15);
            color: #0087ff;
        }

        /* Task mention */
        .mention[data-kind="task"] {
            background: rgba(0, 255, 150, 0.15);
            color: #4dffb3;
        }

        /* Category mention */
        .mention[data-kind="category"] {
            background: rgba(255, 150, 0, 0.15);
            color: #ffb74d;
        }

        /* Hover */
        .task-body .mention:hover,
        .comment-body .mention:hover {
            filter: brightness(1.15);
            text-decoration: underline;
        }

        /* Keyboard focus */
        .task-body .mention:focus,
        .comment-body .mention:focus {
            outline: 2px solid rgba(255, 255, 255, 0.2);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="task">
            <h1 id="task-title">Loading...</h1>
            <div id="task-meta" class="task-meta"></div>
            <div id="task-labels" class="labels"></div>
            <div id="task-assignees" class="assignees"></div>
            <div id="task-body" class="task-body"></div>
        </div>

        <h2>💬 Comments</h2>
        <div id="comments"></div>
        <div id="sentinel" class="sentinel"></div>
    </div>

    <script type="module">
        import Sayr from "https://esm.sh/@sayrio/public";

        /* ---------------- PARAMS ---------------- */

        const parts = window.location.pathname.split("/").filter(Boolean);

        let ORG_SLUG = null;
        let TASK_SHORT_ID = null;
        let TASK_ID = null;

        if (parts[1] === "org") {
            ORG_SLUG = parts[2] || null;
            TASK_SHORT_ID = parts[3] ? Number(parts[3]) : null;
        }

        if (!ORG_SLUG || TASK_SHORT_ID == null) {
            document.body.innerHTML = "<h1>Missing org or task</h1>";
            throw new Error("Missing org or task");
        }

        /* ---------------- STATE ---------------- */

        let page = 1;
        let loading = false;
        let hasMore = true;

        const taskTitleEl = document.getElementById("task-title");
        const taskMetaEl = document.getElementById("task-meta");
        const taskLabelsEl = document.getElementById("task-labels");
        const taskAssigneesEl = document.getElementById("task-assignees");
        const taskBodyEl = document.getElementById("task-body");
        const commentsEl = document.getElementById("comments");
        const sentinel = document.getElementById("sentinel");

        /* ---------------- HELPERS ---------------- */

        const humanize = (s = "") =>
            s.replace(/-/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());

        /* ---------------- LOAD ORG ---------------- */

        const orgRes = await Sayr.org.get(ORG_SLUG);

        if (!orgRes.success || !orgRes.data) {
            document.body.innerHTML = `<h1>Organization not found</h1>`;
            throw new Error(orgRes.error ?? "Org fetch failed");
        }

        const org = orgRes.data;

        /* ---------------- TASK ---------------- */

        async function loadTask() {
            const res = await Sayr.org.tasks.get(ORG_SLUG, TASK_SHORT_ID);

            if (!res.success || !res.data) return;
            renderTask(res.data);
        }

        function renderTask(task) {
            TASK_ID = task.id;
            document.title = `${task.title} · Sayr.io`;
            taskTitleEl.textContent = task.title;

            taskMetaEl.innerHTML = `
			<span class="badge status-${task.status}">
				${humanize(task.status)}
			</span>
			<span class="badge priority-${task.priority}">
				Priority: ${humanize(task.priority)}
			</span>
			<span class="badge votes">Votes: ${task.voteCount}</span>
		`;

            taskBodyEl.innerHTML = task.descriptionHtml || "";

            renderLabels(task.labels);
            renderAssignees(task.assignees);
        }

        function renderLabels(labels = []) {
            taskLabelsEl.innerHTML = labels
                .map(
                    (l) =>
                        `<span class="label" style="background:${l.color}" title="${l.name}">
						${l.name}
					</span>`,
                )
                .join("");
        }

        function renderAssignees(assignees = []) {
            const MAX = 4;
            const extra = assignees.length - MAX;

            taskAssigneesEl.innerHTML = `
			${assignees
                    .slice(0, MAX)
                    .map(
                        (u) =>
                            `<div class="assignee" title="${u.name}">
							<img src="${u.image || ""}" alt="${u.name}" />
						</div>`,
                    )
                    .join("")}
			${extra > 0
                    ? `<div class="assignee more" title="+${extra} more">+${extra}</div>`
                    : ""
                }
		`;
        }

        /* ---------------- COMMENTS ---------------- */

        async function fetchComments() {
            if (loading || !hasMore) return;
            loading = true;

            const res = await Sayr.org.comments.list(
                ORG_SLUG,
                TASK_SHORT_ID,
                { order: "asc", limit: 30, page },
            );

            if (!res.success || !res.data) {
                loading = false;
                return;
            }

            res.data.items.forEach(appendComment);
            hasMore = res.data.pagination.hasMore;
            page++;

            loading = false;
        }

        function appendComment(c) {
            const el = document.createElement("div");
            el.className = "comment";

            el.innerHTML = `
			<div class="comment-header">
				<img class="avatar" src="${c.createdBy?.image || ""}" />
				<span class="author">${c.createdBy?.name || "Unknown"}</span>
				<span class="date">${new Date(c.createdAt).toLocaleString()}</span>
			</div>
			<div class="comment-body">${c.contentHtml}</div>
			${renderReactions(c.reactions)}
		`;

            commentsEl.appendChild(el);
        }

        function renderReactions(reactions) {
            if (!reactions || reactions.total === 0) return "";

            return `
			<div class="reactions">
				${Object.entries(reactions.reactions || {})
                    .map(
                        ([emoji, data]) =>
                            `<span class="reaction" title="${data.count} reaction(s)">
								${emoji} ${data.count}
							</span>`,
                    )
                    .join("")}
			</div>
		`;
        }

        /* ---------------- INFINITE SCROLL ---------------- */

        new IntersectionObserver((e) => {
            if (e[0].isIntersecting) fetchComments();
        }).observe(sentinel);

        /* ---------------- WEBSOCKET ---------------- */

        if (org.eventsUrl) {
            Sayr.sse(org.eventsUrl, {
                [Sayr.EVENTS.UPDATE_TASK]: (t) => {
                    if (t.id === TASK_ID) renderTask(t);
                },

                [Sayr.EVENTS.UPDATE_TASK_COMMENTS]: (p) => {
                    if (p.id !== TASK_ID) return;
                    page = 1;
                    hasMore = true;
                    commentsEl.innerHTML = "";
                    fetchComments();
                },

                [Sayr.EVENTS.UPDATE_TASK_VOTE]: (p) => {
                    if (p.id !== TASK_ID) return;
                    const badge = taskMetaEl.querySelector(".badge.votes");
                    if (badge) badge.textContent = `Votes: ${p.voteCount}`;
                },
            });
        }

        /* ---------------- INIT ---------------- */

        await loadTask();
        await fetchComments();
    </script>
</body>

</html>
