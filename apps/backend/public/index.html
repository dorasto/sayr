<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project Management Tool." />
    <meta name="keywords" content="Project Management, Task Management, Collaboration, Productivity" />
    <meta name="author" content="doras.to" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph meta tags for social media -->
    <meta property="og:title" content="Welcome to Project Management Tool" />
    <meta property="og:description" content="Project Management Tool." />
    <meta property="og:image" content="/favicon.ico" />
    <meta property="og:url" content="https://api.doras.to" />
    <meta property="og:type" content="website" />

    <!-- Twitter meta tags for Twitter Cards -->
    <meta name="twitter:title" content="Welcome to Project Management Tool" />

    <meta name="twitter:image" content="https://cdn.doras.to/doras/icon-128.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/x-icon" href="https://cdn.doras.to/doras/icon-128.webp" />

    <title>Welcome to Project Management Tool</title>
    <style>
        :root {
            --background: oklch(0.2046 0 0);
            --foreground: oklch(0.9219 0 0);
            --card: oklch(0.2686 0 0);
            --card-foreground: oklch(0.9219 0 0);
            --popover: oklch(0.2686 0 0);
            --popover-foreground: oklch(0.9219 0 0);
            --primary: oklch(0.7686 0.1647 70.0804);
            --primary-foreground: oklch(1.0000 0 0);
            --secondary: oklch(0.2686 0 0);
            --secondary-foreground: oklch(0.9219 0 0);
            --muted: oklch(0.2686 0 0);
            --muted-foreground: oklch(0.7155 0 0);
            --accent: oklch(0.3092 0 0);
            --accent-foreground: oklch(0.8822 0 0);
            --destructive: oklch(0.6368 0.2078 25.3313);
            --destructive-foreground: oklch(1.0000 0 0);
            --border: oklch(0.3715 0 0);
            --input: oklch(0.3715 0 0);
            --ring: oklch(0.7686 0.1647 70.0804);
            --chart-1: oklch(0.8369 0.1644 84.4286);
            --chart-2: oklch(0.6658 0.1574 58.3183);
            --chart-3: oklch(0.4732 0.1247 46.2007);
            --chart-4: oklch(0.5553 0.1455 48.9975);
            --chart-5: oklch(0.4732 0.1247 46.2007);
            --sidebar: oklch(0.1684 0 0);
            --sidebar-foreground: oklch(0.9219 0 0);
            --sidebar-primary: oklch(0.7686 0.1647 70.0804);
            --sidebar-primary-foreground: oklch(1.0000 0 0);
            --sidebar-accent: oklch(0.3092 0 0);
            --sidebar-accent-foreground: oklch(0.8822 0 0);
            --sidebar-border: oklch(0.3715 0 0);
            --sidebar-ring: oklch(0.7686 0.1647 70.0804);
            --font-sans: Inter, sans-serif;
            --font-serif: Source Serif 4, serif;
            --font-mono: JetBrains Mono, monospace;
            --radius: 0.375rem;
            --shadow-2xs: 0px 4px 8px -1px hsl(0 0% 0% / 0.05);
            --shadow-xs: 0px 4px 8px -1px hsl(0 0% 0% / 0.05);
            --shadow-sm: 0px 4px 8px -1px hsl(0 0% 0% / 0.10), 0px 1px 2px -2px hsl(0 0% 0% / 0.10);
            --shadow: 0px 4px 8px -1px hsl(0 0% 0% / 0.10), 0px 1px 2px -2px hsl(0 0% 0% / 0.10);
            --shadow-md: 0px 4px 8px -1px hsl(0 0% 0% / 0.10), 0px 2px 4px -2px hsl(0 0% 0% / 0.10);
            --shadow-lg: 0px 4px 8px -1px hsl(0 0% 0% / 0.10), 0px 4px 6px -2px hsl(0 0% 0% / 0.10);
            --shadow-xl: 0px 4px 8px -1px hsl(0 0% 0% / 0.10), 0px 8px 10px -2px hsl(0 0% 0% / 0.10);
            --shadow-2xl: 0px 4px 8px -1px hsl(0 0% 0% / 0.25);
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: "Montserrat Variable", sans-serif;
            text-align: center;
            padding: 50px;
        }

        .logo {
            width: 150px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: var(--muted-foreground);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--card);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="https://cdn.doras.to/doras/icon-128.webp" alt="Doras.to API Logo" class="logo" />
        <h1>Welcome to Project Management Tool</h1>
        <p class="welcome-message">
            Integrate powerful features into your applications using the Doras.to API.
        </p>

        <p>Explore the full API documentation and start building:</p>
        <p><a href="https://doras.to/documentation?blog=core-api">View API Documentation</a></p>
    </div>
