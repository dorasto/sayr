# see https://docs.zerops.io/zerops-yml/specification for full reference
zerops:
  # ===============================
  # MARKETING (Astro SSR)
  # ===============================
  - setup: marketing
    build:
      base: nodejs@22
      buildCommands:
        - pnpm i
        - pnpm -F marketing zerops:build
      deployFiles:
        # Strip apps/marketing/ prefix so dist/ lands at container root
        - apps/marketing/~dist
        - apps/marketing/~package.json
        # Do NOT deploy apps/marketing/node_modules — it's all pnpm symlinks back
        # into root node_modules, deploying both causes symlink collision on extract
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: 3000
        HOST: 0.0.0.0
      start: node dist/server/entry.mjs

  # ===============================
  # BACKEND (Hono on Bun)
  # ===============================
  - setup: backend
    build:
      base: bun@1.2
      prepareCommands:
        - npm install -g pnpm
      buildCommands:
        - pnpm i
        - pnpm -F backend zerops:build
      deployFiles:
        # compiled backend bundle -> dist/
        - apps/backend/~dist
        # migration runner (compiled standalone JS) -> migrate.js
        - packages/database/~migrate.js
        # SQL migration files -> drizzle/
        - packages/database/~drizzle
        # startup script -> start.sh
        - apps/backend/~start.sh
        # package.json -> package.json
        - apps/backend/~package.json
        # workspace node_modules (resolved deps)
        - node_modules
    run:
      base: bun@1.2
      ports:
        - port: 5468
          httpSupport: true
      initCommands:
        - chmod +x start.sh
      start: sh start.sh

  # ===============================
  # START (TanStack Start / Node SSR)
  # ===============================
  - setup: start
    build:
      base: nodejs@22
      buildCommands:
        - pnpm i
        - pnpm -F start zerops:build
      deployFiles:
        # Strip apps/start/ prefix so .output/ lands at container root
        - apps/start/~.output
        - apps/start/~package.json
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        # Replicate entrypoint.sh: replace build-time placeholders with runtime env values.
        # Each line finds files containing the placeholder and replaces inline with sed.
        - grep -rl "___VITE_URL_ROOT___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_URL_ROOT___|${VITE_URL_ROOT}|g"
        - grep -rl "___VITE_PROJECT_NAME___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_PROJECT_NAME___|${VITE_PROJECT_NAME}|g"
        - grep -rl "___VITE_ROOT_DOMAIN___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_ROOT_DOMAIN___|${VITE_ROOT_DOMAIN}|g"
        - grep -rl "___VITE_GITHUB_APP_NAME___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_GITHUB_APP_NAME___|${VITE_GITHUB_APP_NAME}|g"
        - grep -rl "___VITE_SAYR_FRONTEND_AXIOM_DATASET___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_SAYR_FRONTEND_AXIOM_DATASET___|${VITE_SAYR_FRONTEND_AXIOM_DATASET}|g"
        - grep -rl "___VITE_SAYR_FRONTEND_AXIOM_TOKEN___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_SAYR_FRONTEND_AXIOM_TOKEN___|${VITE_SAYR_FRONTEND_AXIOM_TOKEN}|g"
        - grep -rl "___VITE_KLIPY_API___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_KLIPY_API___|${VITE_KLIPY_API}|g"
        - grep -rl "___VITE_APP_VERSION___" .output/ 2>/dev/null | xargs -r sed -i "s|___VITE_APP_VERSION___|${VITE_APP_VERSION}|g"
      start: node .output/server/index.mjs

  # ===============================
  # WORKER (Bun background job processor)
  # ===============================
  - setup: worker
    build:
      base: bun@1.2
      prepareCommands:
        - npm install -g pnpm
      buildCommands:
        - pnpm i
        - pnpm -F worker zerops:build
      deployFiles:
        # Strip apps/worker/ prefix so dist/ lands at container root
        - apps/worker/~dist
        - apps/worker/~package.json
        - node_modules
    run:
      base: bun@1.2
      # No HTTP port - worker polls Redis queue
      start: bun run dist/index.js github

  # ===============================
  # NGINX (path-based reverse proxy)
  # ===============================
  - setup: nginx
    build:
      base: alpine@3.20
      buildCommands:
        - echo "nginx config ready"
      deployFiles:
        # Strip zerops/nginx/ prefix so files land at container root
        - zerops/nginx/~nginx.conf.template
        - zerops/nginx/~proxy.conf
    run:
      base: alpine@3.20
      ports:
        - port: 80
          httpSupport: true
      prepareCommands:
        - apk add --no-cache nginx gettext
      initCommands:
        # Substitute $VITE_ROOT_DOMAIN into nginx config template
        - envsubst '${VITE_ROOT_DOMAIN}' < nginx.conf.template > /etc/nginx/nginx.conf
        - cp proxy.conf /etc/nginx/proxy.conf
        - nginx -t
      start: nginx -g 'daemon off;'
