# see https://docs.zerops.io/zerops-yml/specification for full reference
zerops:
  # ===============================
  # MARKETING (Astro SSR)
  # ===============================
  - setup: marketing
    build:
      base: nodejs@22
      prepareCommands:
        # corepack ships with Node.js 22 — use it instead of npm install -g pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F marketing zerops:build
      deployFiles:
        # Strip apps/marketing/ prefix so dist/ lands at container root
        - apps/marketing/~dist
        - apps/marketing/~package.json
        # Do NOT deploy apps/marketing/node_modules — pnpm symlinks cause collision
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: 3000
        HOST: 0.0.0.0
      start: node dist/server/entry.mjs

  # ===============================
  # BACKEND (Hono on Bun)
  # ===============================
  - setup: backend
    build:
      base: bun@1.2
      prepareCommands:
        # bun@1.2 image has no npm — install pnpm via bun
        - bun install -g pnpm
      buildCommands:
        - pnpm i
        - pnpm -F backend zerops:build
      deployFiles:
        # compiled backend bundle -> dist/
        - apps/backend/~dist
        # migration runner (compiled standalone JS) -> migrate.js
        - packages/database/~migrate.js
        # SQL migration files -> drizzle/
        - packages/database/~drizzle
        # startup script -> start.sh
        - apps/backend/~start.sh
        # package.json -> package.json
        - apps/backend/~package.json
        # workspace node_modules (resolved deps)
        - node_modules
    run:
      base: bun@1.2
      ports:
        - port: 5468
          httpSupport: true
      initCommands:
        - chmod +x start.sh
      start: sh start.sh

  # ===============================
  # START (TanStack Start / Node SSR)
  # ===============================
  - setup: start
    build:
      base: nodejs@22
      envVariables:
        NODE_OPTIONS: --max-old-space-size=8192
      prepareCommands:
        # corepack ships with Node.js 22 — use it instead of npm install -g pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F start zerops:build
      deployFiles:
        # Strip apps/start/ prefix so .output/ lands at container root
        - apps/start/~.output
        - apps/start/~package.json
        # Startup script: placeholder replacement + Nitro manifest size patching
        - apps/start/~zerops-start.sh
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        # Run placeholder replacement + Nitro asset manifest size patching
        - chmod +x zerops-start.sh && sh zerops-start.sh
      start: node .output/server/index.mjs

  # ===============================
  # WORKER (Bun background job processor)
  # ===============================
  - setup: worker
    build:
      base: bun@1.2
      prepareCommands:
        # bun@1.2 image has no npm — install pnpm via bun
        - bun install -g pnpm
      buildCommands:
        - pnpm i
        - pnpm -F worker zerops:build
      deployFiles:
        # Strip apps/worker/ prefix so dist/ lands at container root
        - apps/worker/~dist
        - apps/worker/~package.json
        - node_modules
    run:
      base: bun@1.2
      # No HTTP port - worker polls Redis queue
      start: bun run dist/index.js github

  # ===============================
  # NGINX (subdomain-based reverse proxy)
  # ===============================
  # IMPORTANT: This service must be created as "Ubuntu" type in the Zerops dashboard,
  # NOT "Nginx Static". We need full control over the nginx process and config.
  - setup: nginx
    build:
      base: ubuntu@24.04
      buildCommands:
        # Copy config files for deploy
        - cp zerops/nginx/nginx.conf.template nginx.conf.template
        - cp zerops/nginx/proxy.conf proxy.conf
      deployFiles:
        - nginx.conf.template
        - proxy.conf
    run:
      base: ubuntu@24.04
      ports:
        - port: 80
          httpSupport: true
      prepareCommands:
        # Install nginx and envsubst (from gettext-base) into the runtime
        - sudo apt-get update && sudo apt-get install -y --no-install-recommends nginx gettext-base && sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*
      initCommands:
        # Extract the first nameserver from /etc/resolv.conf for nginx resolver directive
        - export NAMESERVER=$(grep -m1 '^nameserver' /etc/resolv.conf | awk '{print $2}') && envsubst '${VITE_ROOT_DOMAIN} ${NAMESERVER}' < /var/www/nginx.conf.template | sudo tee /etc/nginx/nginx.conf > /dev/null
        # Validate config before starting
        - sudo nginx -t
      start: sudo nginx -g 'daemon off;'
      healthCheck:
        httpGet:
          port: 80
          path: /healthz
