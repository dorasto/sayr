# see https://docs.zerops.io/zerops-yml/specification for full reference
zerops:
  # ===============================
  # MARKETING (Astro SSR)
  # ===============================
  - setup: marketing
    build:
      base: nodejs@20
      buildCommands:
        - pnpm i
        - pnpm -F marketing build
      deployFiles:
        - apps/marketing/dist
        - apps/marketing/package.json
        - apps/marketing/node_modules
        - node_modules
    run:
      base: nodejs@20
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: 3000
        HOST: 0.0.0.0
      start: node apps/marketing/dist/server/entry.mjs

  # ===============================
  # BACKEND (Hono on Bun)
  # ===============================
  - setup: backend
    build:
      base: bun@1.2
      prepareCommands:
        # bun@1.2 image has no npm — install pnpm via bun
        - bun install -g pnpm
      buildCommands:
        - pnpm i
        - pnpm -F backend zerops:build
      deployFiles:
        # compiled backend bundle -> dist/
        - apps/backend/~dist
        # migration runner (compiled standalone JS) -> migrate.js
        - packages/database/~migrate.js
        # SQL migration files -> drizzle/
        - packages/database/~drizzle
        # startup script -> start.sh
        - apps/backend/~start.sh
        # package.json -> package.json
        - apps/backend/~package.json
        # workspace node_modules (resolved deps)
        - node_modules
    run:
      base: bun@1.2
      ports:
        - port: 5468
          httpSupport: true
      initCommands:
        - chmod +x start.sh
        # jsdom's bundled code resolves __dirname to the build-time path
        # (/build/source/node_modules/...) for its CSS assets. Create a symlink
        # so those paths resolve at runtime where node_modules actually lives.
        - sudo mkdir -p /build/source && sudo ln -sf /var/www/node_modules /build/source/node_modules
      start: sh start.sh
      healthCheck:
        httpGet:
          port: 5468
          path: /api/health

  # ===============================
  # START (TanStack Start / Node SSR)
  # ===============================
  - setup: start
    build:
      base: nodejs@22
      envVariables:
        NODE_OPTIONS: --max-old-space-size=8192
        # These VITE_* / define vars are baked into the bundle at build time (see vite.config.ts)
        APP_ENV: production
        SAYR_EDITION: cloud
      prepareCommands:
        # corepack ships with Node.js 22 — use it instead of npm install -g pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F start zerops:build
      deployFiles:
        # Strip apps/start/ prefix so .output/ lands at container root
        - apps/start/~.output
        - apps/start/~package.json
        # Startup script: placeholder replacement + Nitro manifest size patching
        - apps/start/~zerops-start.sh
        - node_modules
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        # Run placeholder replacement + Nitro asset manifest size patching
        - chmod +x zerops-start.sh && sh zerops-start.sh
      start: node .output/server/index.mjs

  # ===============================
  # WORKER (Bun background job processor)
  # ===============================
  - setup: worker
    build:
      base: bun@1.2
      prepareCommands:
        # bun@1.2 image has no npm — install pnpm via bun
        - bun install -g pnpm
      buildCommands:
        - pnpm i
        - pnpm -F worker zerops:build
      deployFiles:
        # Strip apps/worker/ prefix so dist/ lands at container root
        - apps/worker/~dist
        - apps/worker/~package.json
        - node_modules
    run:
      base: bun@1.2
      ports:
        - port: 8080
          httpSupport: true
      healthCheck:
        httpGet:
          port: 8080
          path: /
      start: bun run dist/index.js github

  # ===============================
  # NGINX (subdomain-based reverse proxy)
  # ===============================
  # IMPORTANT: This service must be created as "Ubuntu" type in the Zerops dashboard,
  # NOT "Nginx Static". We need full control over the nginx process and config.
  - setup: nginx
    build:
      base: ubuntu@24.04
      buildCommands:
        # Copy config files for deploy
        - cp zerops/nginx/nginx.conf.template nginx.conf.template
        - cp zerops/nginx/proxy.conf proxy.conf
      deployFiles:
        - nginx.conf.template
        - proxy.conf
    run:
      base: ubuntu@24.04
      ports:
        - port: 80
          httpSupport: true
      prepareCommands:
        # Install nginx and envsubst (from gettext-base) into the runtime
        - sudo apt-get update && sudo apt-get install -y --no-install-recommends nginx gettext-base && sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*
      initCommands:
        # Substitute VITE_ROOT_DOMAIN into the nginx config template
        - "envsubst '${VITE_ROOT_DOMAIN}' < /var/www/nginx.conf.template | sudo tee /etc/nginx/nginx.conf > /dev/null"
        # Validate config before starting
        - sudo nginx -t
      start: sudo nginx -g 'daemon off;'
      # Gracefully reload nginx every minute to re-resolve upstream IPs.
      # When backend/start/marketing redeploy and get new IPs, nginx picks
      # them up automatically instead of 502-ing.
      crontab:
        - command: sudo nginx -s reload
          timing: "* * * * *"
          allContainers: true
      healthCheck:
        httpGet:
          port: 80
          path: /healthz
