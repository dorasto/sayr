# see https://docs.zerops.io/zerops-yml/specification for full reference
zerops:
  # ===============================
  # MARKETING (Astro SSR)
  # ===============================
  - setup: marketing
    build:
      base: nodejs@20
      buildCommands:
        - pnpm i
        - pnpm -F marketing build
      deployFiles:
        - apps/marketing/dist
        - apps/marketing/package.json
        - apps/marketing/node_modules
        - node_modules
    deploy:
      readinessCheck:
        httpGet:
          port: 3000
          path: /
    run:
      base: nodejs@20
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: 3000
        HOST: 0.0.0.0
      start: node apps/marketing/dist/server/entry.mjs

  # ===============================
  # BACKEND (Hono on Bun)
  # ===============================
  - setup: backend
    build:
      base: bun@latest
      os: ubuntu
      prepareCommands:
        # Use corepack for pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F backend zerops:build
      deployFiles:
        # compiled backend bundle -> dist/
        - apps/backend/~dist
        # migration runner (compiled standalone JS) -> migrate.js
        - packages/database/~migrate.js
        # SQL migration files -> drizzle/
        - packages/database/~drizzle
        # startup script -> start.sh
        - apps/backend/~start.sh
        # package.json -> package.json
        - apps/backend/~package.json
        # workspace node_modules (resolved deps)
        - node_modules
    deploy:
      readinessCheck:
        httpGet:
          port: 5468
          path: /api/health
    run:
      base: bun@latest
      os: ubuntu
      ports:
        - port: 5468
          httpSupport: true
      initCommands:
        # jsdom's bundled code resolves __dirname to the build-time path
        # (/build/source/node_modules/...) for its CSS assets. Create a symlink
        # so those paths resolve at runtime where node_modules actually lives.
        - sudo mkdir -p /build/source && sudo ln -sf /var/www/node_modules /build/source/node_modules
      start: chmod +x start.sh && sh start.sh
      healthCheck:
        httpGet:
          port: 5468
          path: /api/health

  # ===============================
  # START (TanStack Start / Node SSR)
  # ===============================
  - setup: start
    build:
      base: nodejs@22
      envVariables:
        NODE_OPTIONS: --max-old-space-size=8192
        # These VITE_* / define vars are baked into the bundle at build time (see vite.config.ts)
        APP_ENV: production
        SAYR_EDITION: cloud
      prepareCommands:
        # corepack ships with Node.js 22 — use it instead of npm install -g pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F start zerops:build
      deployFiles:
        # Strip apps/start/ prefix so .output/ lands at container root
        - apps/start/~.output
        - apps/start/~package.json
        # Startup script: placeholder replacement + Nitro manifest size patching
        - apps/start/~zerops-start.sh
        - node_modules
    deploy:
      readinessCheck:
        httpGet:
          port: 3000
          path: /health
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      initCommands:
        # Run placeholder replacement + Nitro asset manifest size patching
        - chmod +x zerops-start.sh && sh zerops-start.sh
      start: node .output/server/index.mjs

  # ===============================
  # WORKER (Bun background job processor)
  # ===============================
  - setup: workermain
    build:
      base: bun@latest
      os: ubuntu
      prepareCommands:
        # Use corepack for pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F worker zerops:build
      deployFiles:
        # Strip apps/worker/ prefix so dist/ lands at container root
        - apps/worker/~dist
        - apps/worker/~package.json
        - node_modules
    run:
      base: bun@latest
      os: ubuntu
      ports:
        - port: 8080
          httpSupport: true
      healthCheck:
        httpGet:
          port: 8080
          path: /
      start: bun run dist/index.js main

  - setup: workergithub
    build:
      base: bun@latest
      os: ubuntu
      prepareCommands:
        # Use corepack for pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F worker zerops:build
      deployFiles:
        # Strip apps/worker/ prefix so dist/ lands at container root
        - apps/worker/~dist
        - apps/worker/~package.json
        - node_modules
    run:
      base: bun@latest
      os: ubuntu
      ports:
        - port: 8080
          httpSupport: true
      healthCheck:
        httpGet:
          port: 8080
          path: /
      start: bun run dist/index.js github

  - setup: integrations
    build:
      base: bun@latest
      os: ubuntu
      prepareCommands:
        # Use corepack for pnpm
        - corepack enable && corepack prepare pnpm@latest --activate
      buildCommands:
        - pnpm i
        - pnpm -F integrations build:all
      deployFiles:
        # Strip integrations/ prefix so dist/ lands at container root
        - integrations/~dist
        - integrations/services
        - node_modules
    run:
      base: bun@latest
      os: ubuntu
      ports:
        - port: 8080
          httpSupport: true
      healthCheck:
        httpGet:
          port: 8080
          path: /
      start: bun run dist/index.js
